<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombas Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .tab-content { display: none; }
        .nav-link.active { font-weight: bold; border-bottom: 3px solid #0d6efd; }
        .badge { font-size: 0.9em; }
    </style>
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Bombas Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" onclick="showTab('bombas')">Bombas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showTab('perforaciones')">Perforaciones</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" onclick="showTab('catalogo')">Catálogo</a>
                    </li>
                    <!-- NUEVA PESTAÑA -->
                    <li class="nav-item">
                        <a class="nav-link active" id="tab-reparaciones" onclick="showTab('reparaciones')">
                            🔧 Reparaciones
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ====================== REPARACIONES ====================== -->
    <div id="content-reparaciones" class="tab-content container mt-4">
        <h2>🔧 Gestión de Reparaciones de Bombas</h2>
        
        <div class="mb-3">
            <button class="btn btn-primary" onclick="nuevaReparacion()">
                <i class="fas fa-plus"></i> Nueva Reparación
            </button>
            <button class="btn btn-success ms-2" onclick="cargarListaReparaciones()">
                <i class="fas fa-refresh"></i> Actualizar Lista
            </button>
        </div>

        <div class="row mb-3">
            <div class="col-md-3">
                <input type="text" id="filtro-equipo" class="form-control" placeholder="N° Equipo o Tag">
            </div>
            <div class="col-md-3">
                <select id="filtro-estado" class="form-control">
                    <option value="">Todos los estados</option>
                    <option value="Entregada">Entregada</option>
                    <option value="En reparación">En reparación</option>
                    <option value="Pendiente">Pendiente</option>
                    <option value="Esperando cotización">Esperando cotización</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-info w-100" onclick="cargarListaReparaciones()">🔍 Filtrar</button>
            </div>
        </div>

        <table class="table table-striped table-hover" id="tabla-reparaciones">
            <thead class="table-dark">
                <tr>
                    <th>Fecha Envío</th>
                    <th>N° Equipo</th>
                    <th>Tag</th>
                    <th>Proveedor</th>
                    <th>Estado</th>
                    <th>Solped / NP</th>
                    <th>Fecha Entrega</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Otros contenidos (mantengo placeholder) -->
    <div id="content-bombas" class="tab-content container mt-4" style="display: block;">
        <h2>Bombas (contenido original)</h2>
        <!-- Tu contenido original de bombas va aquí -->
    </div>

    <!-- Modal Reparación -->
    <div class="modal fade" id="modal-reparacion" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">Nueva Reparación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <!-- Formulario aquí -->
                    <div id="modal-body-reparacion">
                        <!-- Se llena con JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ====================== FUNCIONES REPARACIONES ======================
        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById(`content-${tab}`).style.display = 'block';

            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const active = document.getElementById(`tab-${tab}`);
            if (active) active.classList.add('active');

            if (tab === 'reparaciones') cargarListaReparaciones();
        }

        async function cargarListaReparaciones() {
            const equipo = document.getElementById('filtro-equipo').value.trim();
            let url = '/api/reparaciones';
            if (equipo) url += `?numero_equipo=${encodeURIComponent(equipo)}`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                renderTablaReparaciones(data);
            } catch (e) {
                console.error(e);
                alert("Error al cargar reparaciones");
            }
        }

        function renderTablaReparaciones(data) {
            const tbody = document.querySelector('#tabla-reparaciones tbody');
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td>${r.fecha_envio || ''}</td>
                    <td><strong>${r.numero_equipo}</strong></td>
                    <td>${r.tag_principal || ''}</td>
                    <td>${r.proveedor}</td>
                    <td><span class="badge ${r.estado === 'Entregada' ? 'bg-success' : 'bg-warning'}">${r.estado}</span></td>
                    <td>${r.solped || ''} ${r.np ? '/ ' + r.np : ''}</td>
                    <td>${r.fecha_entrega || ''}</td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editarReparacion(${r.id})">Editar</button>
                    </td>
                </tr>
            `).join('');
        }

        function nuevaReparacion() {
            alert("✅ Modal de Nueva Reparación listo para implementar.\n\nPor ahora el backend ya está funcionando.");
        }

        function editarReparacion(id) {
            alert("Editar reparación ID: " + id);
        }

        // Inicializar
        window.onload = () => {
            showTab('reparaciones');
        };
    </script>
</body>
</html>
