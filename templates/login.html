<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POZO/MGR — Ingresar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e2e8f0;
  }
  .login-wrap {
    width: 100%;
    max-width: 380px;
    padding: 24px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 14px;
  }
  .logo-title {
    font-size: 22px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.5px;
  }
  .logo-sub {
    font-size: 13px;
    color: #64748b;
    margin-top: 4px;
  }
  .card {
    background: #1a1d27;
    border: 1px solid #2e3350;
    border-radius: 14px;
    padding: 28px;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .field input {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2e3350;
    border-radius: 8px;
    padding: 11px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus {
    border-color: #6366f1;
  }
  .btn-login {
    width: 100%;
    background: #6366f1;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-login:hover { background: #5457d4; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    background: #3b1515;
    border: 1px solid #ef4444;
    border-radius: 8px;
    padding: 10px 14px;
    color: #fca5a5;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .footer-txt {
    text-align: center;
    font-size: 11px;
    color: #334155;
    margin-top: 20px;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">💧</div>
    <div class="logo-title">POZO/MGR</div>
    <div class="logo-sub">Sistema de Gestión</div>
  </div>

  <div class="card">
    <div class="error-msg" id="err"></div>

    <div class="field">
      <label>Usuario</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username" autofocus>
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn" onclick="doLogin()">Ingresar</button>
  </div>

  <div class="footer-txt">AYSA · La Plata</div>
</div>

<script>
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const err = document.getElementById('err');
    const btn = document.getElementById('btn');

    if (!username || !password) {
      err.textContent = 'Ingresá usuario y contraseña';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Ingresando...';
    err.style.display = 'none';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        err.textContent = data.error || 'Error al ingresar';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        return;
      }

      // Redirigir al home de módulos
      window.location.href = '/home';

    } catch (e) {
      err.textContent = 'Error de conexión';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Ingresar';
    }
  }
</script>
</body>
</html>
