<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POZO/MGR — Login</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root{--bg:#0f1117;--bg2:#171b26;--bg3:#1e2332;--border:#2a2f42;--text:#e8eaf0;--text2:#8b91a8;--text3:#555d78;--accent:#4f8ef7;--accent2:#2563d4;--red:#f05454;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:2.5rem 2rem;width:360px}
  .logo{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);letter-spacing:.1em;margin-bottom:6px}
  .logo span{color:var(--text3)}
  .subtitle{font-size:12px;color:var(--text3);margin-bottom:2rem}
  label{display:block;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:5px}
  input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:10px 12px;font-size:14px;font-family:var(--sans);outline:none;transition:border-color .15s;margin-bottom:14px}
  input:focus{border-color:var(--accent)}
  .btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:11px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:background .15s;margin-top:6px}
  .btn:hover{background:var(--accent2)}
  .error{background:rgba(240,84,84,.1);border:1px solid rgba(240,84,84,.3);color:var(--red);border-radius:6px;padding:8px 12px;font-size:13px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">POZO<span>/</span>MGR</div>
  <div class="subtitle">Sistema de Gestión de Bombas de Pozo Profundo</div>
  <div>
    <label>Usuario</label>
    <input type="text" id="username" placeholder="usuario" autocomplete="username">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Ingresar</button>
    <div class="error" id="err"></div>
  </div>
</div>
<script>
async function doLogin(){
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const err=document.getElementById('err');
  err.style.display='none';
  if(!u||!p){err.textContent='Completá usuario y contraseña';err.style.display='block';return;}
  const res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
  const data = await res.json();
  if(res.ok){ window.location.href='/'; }
  else{ err.textContent=data.error||'Error al ingresar';err.style.display='block'; }
}
</script>
</body>
</html>
