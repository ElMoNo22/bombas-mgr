<!-- ============================================================
     CHAT WIDGET — Pegar antes del cierre de </body> en index.html
     ============================================================ -->

<!-- Botón flotante -->
<button id="chat-fab" onclick="toggleChat()" title="Asistente IA"
  style="
    position:fixed; bottom:24px; right:24px; z-index:9999;
    width:56px; height:56px; border-radius:50%; border:none;
    background:linear-gradient(135deg,#4f8ef7,#2563eb);
    color:#fff; font-size:26px; cursor:pointer;
    box-shadow:0 4px 16px rgba(37,99,235,0.4);
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s;
  "
  onmouseover="this.style.transform='scale(1.1)'"
  onmouseout="this.style.transform='scale(1)'">
  🤖
</button>

<!-- Panel de chat -->
<div id="chat-panel" style="
    display:none; position:fixed; bottom:90px; right:24px; z-index:9998;
    width:370px; max-height:520px;
    background:#1a1f2e; border:1px solid #2d3748;
    border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
    display:none; flex-direction:column; overflow:hidden;
    font-family:'Segoe UI',sans-serif;
  ">

  <!-- Header -->
  <div style="
      background:linear-gradient(135deg,#4f8ef7,#2563eb);
      padding:14px 16px; display:flex; align-items:center;
      justify-content:space-between;
    ">
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:22px;">🤖</span>
      <div>
        <div style="color:#fff;font-weight:700;font-size:15px;">Asistente POZO/MGR</div>
        <div style="color:#bfdbfe;font-size:11px;">Powered by Gemini</div>
      </div>
    </div>
    <button onclick="toggleChat()" style="
        background:none;border:none;color:#fff;font-size:20px;
        cursor:pointer;line-height:1;padding:2px 6px;border-radius:6px;
      " onmouseover="this.style.background='rgba(255,255,255,0.2)'"
        onmouseout="this.style.background='none'">✕</button>
  </div>

  <!-- Mensajes -->
  <div id="chat-messages" style="
      flex:1; overflow-y:auto; padding:14px; display:flex;
      flex-direction:column; gap:10px; max-height:340px;
      scrollbar-width:thin; scrollbar-color:#2d3748 transparent;
    ">
    <!-- Mensaje inicial -->
    <div style="
        background:#2d3748; color:#e2e8f0; border-radius:12px 12px 12px 2px;
        padding:10px 14px; font-size:13px; max-width:85%; line-height:1.5;
      ">
      ¡Hola! Soy tu asistente. Podés preguntarme sobre el estado del sistema, reparaciones, bombas por zona, costos y más. ¿En qué te ayudo?
    </div>
  </div>

  <!-- Sugerencias rápidas -->
  <div id="chat-suggestions" style="
      padding:0 14px 10px; display:flex; flex-wrap:wrap; gap:6px;
    ">
    <button class="sugerencia" onclick="sendSuggestion(this)">📊 Resumen general</button>
    <button class="sugerencia" onclick="sendSuggestion(this)">🔧 Reparaciones activas</button>
    <button class="sugerencia" onclick="sendSuggestion(this)">📍 Bombas por zona</button>
    <button class="sugerencia" onclick="sendSuggestion(this)">💰 Costo reparaciones</button>
  </div>

  <!-- Input -->
  <div style="
      padding:10px 14px 14px; display:flex; gap:8px; border-top:1px solid #2d3748;
    ">
    <input id="chat-input" type="text"
      placeholder="Hacé una pregunta..."
      onkeydown="if(event.key==='Enter') sendChat()"
      style="
        flex:1; background:#2d3748; border:1px solid #4a5568; border-radius:10px;
        color:#e2e8f0; padding:9px 13px; font-size:13px; outline:none;
      "
      onfocus="this.style.borderColor='#4f8ef7'"
      onblur="this.style.borderColor='#4a5568'"
    />
    <button onclick="sendChat()" id="chat-send-btn" style="
        background:#2563eb; border:none; border-radius:10px;
        color:#fff; padding:9px 14px; cursor:pointer; font-size:16px;
        transition:background .2s;
      "
      onmouseover="this.style.background='#1d4ed8'"
      onmouseout="this.style.background='#2563eb'">➤</button>
  </div>
</div>

<style>
.sugerencia {
  background:#2d3748; border:1px solid #4a5568; color:#93c5fd;
  border-radius:20px; padding:4px 10px; font-size:11px; cursor:pointer;
  transition:all .15s;
}
.sugerencia:hover {
  background:#374151; border-color:#4f8ef7; color:#bfdbfe;
}
#chat-messages::-webkit-scrollbar { width:4px; }
#chat-messages::-webkit-scrollbar-track { background:transparent; }
#chat-messages::-webkit-scrollbar-thumb { background:#4a5568; border-radius:4px; }
</style>

<script>
let chatVisible = false;

function toggleChat() {
  chatVisible = !chatVisible;
  const panel = document.getElementById('chat-panel');
  panel.style.display = chatVisible ? 'flex' : 'none';
  if (chatVisible) {
    document.getElementById('chat-input').focus();
    scrollChatBottom();
  }
}

function scrollChatBottom() {
  const msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function addMessage(text, role) {
  const msgs = document.getElementById('chat-messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.style.cssText = `
    background:${isUser ? '#2563eb' : '#2d3748'};
    color:${isUser ? '#fff' : '#e2e8f0'};
    border-radius:${isUser ? '12px 12px 2px 12px' : '12px 12px 12px 2px'};
    padding:10px 14px; font-size:13px;
    max-width:85%; line-height:1.5; white-space:pre-wrap;
    align-self:${isUser ? 'flex-end' : 'flex-start'};
  `;
  div.textContent = text;
  msgs.appendChild(div);
  scrollChatBottom();
  return div;
}

function addTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.id = 'chat-typing';
  div.style.cssText = `
    background:#2d3748; color:#93c5fd;
    border-radius:12px 12px 12px 2px;
    padding:10px 14px; font-size:13px; max-width:85%;
  `;
  div.textContent = '⏳ Pensando...';
  msgs.appendChild(div);
  scrollChatBottom();
}

function removeTyping() {
  const el = document.getElementById('chat-typing');
  if (el) el.remove();
}

function sendSuggestion(btn) {
  const text = btn.textContent.replace(/^[^\w]+/, '').trim();
  document.getElementById('chat-input').value = text;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;

  // Ocultar sugerencias después del primer mensaje
  document.getElementById('chat-suggestions').style.display = 'none';

  input.value = '';
  addMessage(msg, 'user');
  addTyping();

  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;
  input.disabled = true;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await resp.json();
    removeTyping();
    if (data.reply) {
      addMessage(data.reply, 'bot');
    } else {
      addMessage('⚠️ Error: ' + (data.error || 'Respuesta inesperada'), 'bot');
    }
  } catch (err) {
    removeTyping();
    addMessage('⚠️ No se pudo conectar con el servidor.', 'bot');
  } finally {
    btn.disabled = false;
    input.disabled = false;
    input.focus();
  }
}
</script>
